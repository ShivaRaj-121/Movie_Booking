<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booking Successful</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI', sans-serif;
}

body{
background:#0b0b0b;
color:white;
}

/* NAVBAR */
.navbar{
position:fixed;
top:0;
width:100%;
background:rgba(0,0,0,0.9);
backdrop-filter: blur(10px);
border-bottom:1px solid #00ff88;
padding:15px 40px;
z-index:1000;
}

.nav-container{
display:flex;
justify-content:space-between;
align-items:center;
}

.logo a{
color:#00ff88;
text-decoration:none;
font-size:24px;
font-weight:bold;
}

.nav-right{
display:flex;
gap:20px;
}

.nav-link{
color:white;
text-decoration:none;
}

.nav-link:hover{
color:#00ff88;
}

.logout-btn{
background:#00ff88;
color:black;
padding:6px 16px;
border-radius:20px;
text-decoration:none;
font-weight:bold;
}

/* MAIN WRAPPER */
.wrapper{
padding-top:100px;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

/* TICKET */
.ticket-container{
width:850px;
background:#121212;
border-radius:20px;
display:flex;
overflow:hidden;
box-shadow:0 0 40px rgba(0,255,136,0.2);
border:1px solid #1a1a1a;
}

/* POSTER */
.poster-section{
width:40%;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

.poster-section img{
width:220px;
height:300px;
border-radius:12px;
object-fit:cover;
box-shadow:0 0 20px rgba(0,255,136,0.4);
}

/* DETAILS */
.details-section{
width:60%;
padding:35px;
}

.success{
font-size:30px;
color:#00ff88;
margin-bottom:15px;
}

/* DETAILS TEXT */
.details p{
margin:10px 0;
color:#ccc;
}

.details span{
color:#00ff88;
font-weight:bold;
}

/* MESSAGE */
.message{
margin-top:15px;
font-size:14px;
color:#aaa;
}

/* BUTTON */
.btn{
margin-top:25px;
padding:12px 30px;
border:none;
border-radius:30px;
background:#00ff88;
color:black;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.btn:hover{
background:#00cc6a;
transform:scale(1.05);
box-shadow:0 0 15px #00ff88;
}

/* FOOTER */
.footer{
margin-top:60px;
padding:20px;
text-align:center;
border-top:1px solid #00ff88;
color:#aaa;
width:100%;
}

/* RESPONSIVE */
@media(max-width:768px){
.ticket-container{
flex-direction:column;
width:90%;
}

.poster-section, .details-section{
width:100%;
text-align:center;
}
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
<div class="nav-container">

<div class="logo">
<a href="{% url 'dashboard' %}">P MAX</a>
</div>

<div class="nav-right">
<a href="{% url 'dashboard' %}" class="nav-link">Dashboard</a>
<a href="{% url 'logout' %}" class="logout-btn">Logout</a>
</div>

</div>
</nav>

<!-- MAIN -->
<div class="wrapper">

<div class="ticket-container">

<div class="poster-section">
<img src="{{show.movie.image.url}}">
</div>

<div class="details-section">

<h1 class="success">✔ Booking Confirmed</h1>

<div class="details">
<p><span>Movie:</span> {{show.movie.name}}</p>
<p><span>Theatre:</span> {{show.theater.name}}</p>
<p><span>Show Time:</span> {{show.show_time}}</p>
<p><span>Seats:</span> {{seats}}</p>
<p><span>Total Price:</span> ₹{{total_price}}</p>
</div>

<p class="message">
🎟 Your ticket has been sent to your email successfully.
</p>

<a href="{% url 'dashboard' %}">
<button class="btn">Browse More Movies</button>
</a>

</div>

</div>

</div>

<!-- FOOTER -->
<div class="footer">
<p>P MAX | Movie Booking Platform</p>
</div>

</body>
</html>
