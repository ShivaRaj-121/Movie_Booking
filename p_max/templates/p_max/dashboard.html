<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>P MAX Dashboard</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#0b0b0b;
color:white;
font-family:'Segoe UI', sans-serif;
}

/* NAVBAR */
.navbar{
background:rgba(0,0,0,0.8);
backdrop-filter: blur(10px);
border-bottom:1px solid #00ff88;
}

.navbar-brand{
color:#00ff88 !important;
font-weight:bold;
font-size:26px;
}

/* LOGOUT BUTTON */
.logout-btn{
background:#00ff88;
color:black !important;
padding:6px 18px;
border-radius:20px;
font-weight:bold;
}

.logout-btn:hover{
background:#00cc6a;
color:black !important;
}

/* HERO */
.hero{
height:90vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;

background:
linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.9)),
url("https://images.unsplash.com/photo-1524985069026-dd778a71c7b4");

background-size:cover;
background-position:center;
}

.hero h1{
font-size:55px;
color:#00ff88;
}

.hero p{
font-size:20px;
color:#ccc;
}

.hero button{
padding:12px 30px;
border:none;
border-radius:30px;
background:#00ff88;
font-weight:bold;
transition:0.3s;
}

.hero button:hover{
background:#00cc6a;
transform:scale(1.05);
}

/* SECTION TITLE */
.section-title{
text-align:center;
margin:60px 0 30px;
font-size:36px;
color:#00ff88;
}

/* MOVIE CARD */
.movie-card{
background:#121212;
border-radius:15px;
overflow:hidden;
transition:0.4s;
border:1px solid transparent;
}

.movie-card:hover{
transform:translateY(-10px);
border:1px solid #00ff88;
box-shadow:0 0 25px rgba(0,255,136,0.4);
}

.movie-card img{
height:320px;
object-fit:cover;
}

.movie-card .card-body{
text-align:center;
}

.movie-card h5{
margin:10px 0;
}

.movie-card button{
background:#00ff88;
border:none;
border-radius:20px;
padding:8px 20px;
font-weight:bold;
}

.movie-card button:hover{
background:#00cc6a;
}

/* FOOTER */
.footer{
margin-top:60px;
padding:20px;
text-align:center;
border-top:1px solid #00ff88;
color:#aaa;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg sticky-top">
<div class="container">

<a class="navbar-brand" href="#">P MAX</a>

<button class="navbar-toggler bg-light" data-bs-toggle="collapse" data-bs-target="#nav">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse justify-content-end" id="nav">
<ul class="navbar-nav">
<li class="nav-item">
<a class="nav-link logout-btn" href="{% url 'logout' %}">Logout</a>
</li>
</ul>
</div>

</div>
</nav>

<!-- HERO (Same as Home) -->
<div class="hero">

<div>
<h1>🍿 Welcome Back to P MAX</h1>
<p>Book your favorite movies</p>

<button onclick="scrollMovies()">Browse Movies</button>
</div>

</div>

<!-- MOVIES SECTION -->
<h2 class="section-title">🎬 Movies Collection</h2>

<div class="container">
<div class="row g-4">

{% for i in movies %}

<div class="col-lg-3 col-md-4 col-sm-6">

<div class="movie-card card">

<img src="{{i.image.url}}" class="card-img-top">

<div class="card-body">

<h5 style="color: aliceblue;">{{i.name}}</h5>
<p style="color: aliceblue;">{{i.duration}} Hours</p>

<a href="{% url 'movie_detail' i.id %}">
<button>View Movie</button>
</a>

</div>

</div>

</div>

{% endfor %}

</div>
</div>

<!-- FOOTER -->
<div class="footer">
<p>P MAX | Movie Booking Platform</p>
</div>

<!-- JS -->
<script>
function scrollMovies(){
document.querySelector(".section-title").scrollIntoView({
behavior:"smooth"
})
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
