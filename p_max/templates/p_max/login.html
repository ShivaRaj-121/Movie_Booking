<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<link rel="icon" href="/media/logo.png">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI', sans-serif;
}

/* BODY */
body{
background:#0b0b0b;
color:white;
}

/* NAVBAR */
.navbar{
width:100%;
background:rgba(0,0,0,0.9);
backdrop-filter: blur(10px);
border-bottom:1px solid #00ff88;
padding:15px 40px;
position:fixed;
top:0;
z-index:1000;
}

.nav-container{
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
color:#00ff88;
font-size:24px;
font-weight:bold;
}

.nav-right{
display:flex;
gap:20px;
}

.logout-btn{
background:#00ff88;
color:black;
padding:6px 16px;
border-radius:20px;
text-decoration:none;
font-weight:bold;
}

.logout-btn:hover{
background:#00cc6a;
}

/* CENTER WRAPPER */
.wrapper{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding-top:80px;
}

/* FORM */
.sign{
width:400px;
padding:40px;
text-align:center;

background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);

border-radius:15px;
border:1px solid rgba(255,255,255,0.2);

box-shadow:0 0 25px rgba(0,255,136,0.2);
}

/* TITLE */
.sign h2{
color:#00ff88;
margin-bottom:20px;
}

/* INPUTS */
.sign input{
width:90%;
padding:12px;
margin:12px 0;
border:none;
outline:none;
border-radius:25px;
background:rgba(255,255,255,0.1);
color:white;
}

.sign input::placeholder{
color:#aaa;
}

.footer{
margin-top:60px;
padding:20px;
text-align:center;
border-top:1px solid #00ff88;
color:#aaa;
}
/* BUTTON */
.sign button{
margin-top:20px;
padding:12px 35px;
border:none;
border-radius:25px;
background:#00ff88;
color:black;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.sign button:hover{
transform:scale(1.05);
background:#00cc6a;
}

/* ERROR */
.error{
color:red;
margin-top:10px;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
<div class="nav-container">

<div class="logo">
<a href="{% url 'dashboard' %}" style="color:#00ff88;text-decoration:none;">P MAX</a>
</div>

<div class="nav-right">
<a href="{% url 'signUp' %}" class="logout-btn">Signup</a>
</div>

</div>
</nav>

<!-- CENTER FORM -->
<div class="wrapper">

<form class="sign" method="POST">
{% csrf_token %}

<h2>Login</h2>

{% if error %}
<p class="error">{{error}}</p>
{% endif %}

<input type="text" placeholder="Enter Username" required name="username">

<input type="password" placeholder="Enter Password" required name="password">

<button>Login</button>

</form>

</div>
<!-- FOOTER -->
<div class="footer">
<p>P MAX | Movie Booking Platform</p>
</div>


</body>
</html>
